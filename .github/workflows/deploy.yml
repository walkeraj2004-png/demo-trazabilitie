name: Deploy a GitHub Pages

# GitHub Pages solo sirve archivos estáticos: no hay servidor Node, no hay
# API routes. Este workflow compila la app Next.js como export estático
# (next.config.mjs: output "export") y publica esa carpeta. Deja de ser
# viable en cuanto el backend real (fusión Xpotrack/couriers, F1) necesite
# un servidor; ese día el deploy se muda a un host con servidor (Vercel u
# otro) y este workflow se retira.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build (export estático con basePath del repo)
        env:
          NEXT_PUBLIC_BASE_PATH: /demo-trazabilitie
          NEXT_PUBLIC_BASE_URL: https://walkeraj2004-png.github.io/demo-trazabilitie
        run: npm run build

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
